<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX server | 未来与奇迹</title>
    <style>
        :root {
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.35);
            --bg-dark: #03050d;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --ark-bezier: cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark) !important;
            overflow: hidden; 
            color: #fff; font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            user-select: none;
        }

        /* --- 顶部全局导航栏 --- */
        .top-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 64px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4%; background: rgba(3, 5, 13, 0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 3000;
        }
        .header-left { display: flex; align-items: center; gap: clamp(20px, 3vw, 40px); }
        .header-logo { font-size: clamp(0.95rem, 1.2vw, 1.1rem); letter-spacing: 4px; font-weight: 600; color: #fff; white-space: nowrap; }

        .nav-menu { display: flex; gap: clamp(15px, 2.5vw, 35px); height: 64px; align-items: center; }
        .nav-btn {
            font-size: clamp(0.8rem, 1vw, 0.9rem); color: rgba(255,255,255,0.6); cursor: pointer;
            transition: color 0.2s linear; position: relative; letter-spacing: 1px; white-space: nowrap;
            padding: 8px 0;
        }
        .nav-btn::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background-color: var(--accent); box-shadow: 0 0 8px var(--accent);
            transform: scaleX(0); transform-origin: left center;
            transition: transform 0.3s var(--ark-bezier);
        }
        .nav-btn:hover, .nav-btn.active { color: #fff; }
        .nav-btn:hover::after, .nav-btn.active::after { transform: scaleX(1); }

        /* --- 主舞台（大厅视界） --- */
        #main-stage { 
            position: relative; width: 100%; height: 100%; z-index: 10; 
            background-color: var(--bg-dark); 
            opacity: 1; transform: scale(1);
            transition: opacity 0.45s var(--ark-bezier), transform 0.45s var(--ark-bezier);
        }
        #main-stage.stage-hidden { 
            opacity: 0; transform: scale(0.95);
            pointer-events: none !important; 
        }
        #star-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .character-split-layer {
            position: absolute; inset: 0; z-index: 2;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.75) 0%, rgba(30, 41, 59, 0.5) 50%, transparent 50.01%);
            backdrop-filter: blur(2px); pointer-events: none;
        }

        .view-homepage-content { width: 100%; height: 100%; position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; }
        .center-hero { text-align: center; z-index: 5; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        .title-large { font-size: clamp(2.5rem, 5vw, 4.5rem); letter-spacing: 12px; font-weight: 300; margin: 0; text-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .title-sub { font-size: clamp(0.9rem, 1.5vw, 1.2rem); letter-spacing: 8px; color: rgba(255,255,255,0.6); margin: 15px 0 0 0; }
        .quote-text { margin-top: 5vh; font-size: clamp(0.75rem, 0.9vw, 0.85rem); color: rgba(255,255,255,0.4); letter-spacing: 3px; line-height: 1.8; max-width: 600px; }

        .hero-arrow-wrap {
            margin-top: 28px; pointer-events: auto; cursor: pointer;
            animation: arrowFloatHorizontal 2.5s ease-in-out infinite alternate;
        }
        @keyframes arrowFloatHorizontal { 0% { transform: translateX(-8px); } 100% { transform: translateX(8px); } }
        .hero-arrow-circle {
            display: flex; align-items: center; justify-content: center; width: 48px; height: 48px;
            background: #ffffff; border-radius: 50%; box-shadow: 0 0 28px rgba(255, 255, 255, 0.35);
            transition: transform 0.3s var(--ark-bezier);
        }
        .hero-arrow-circle svg { width: 20px; height: 20px; fill: none; stroke: #0f172a; stroke-width: 2.5; }
        .hero-arrow-wrap:hover .hero-arrow-circle { transform: scale(1.1); }

        /* ================= 高级视窗切换控制引擎 ================= */
        .fullview-overlay {
            position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1500; 
            padding: 90px 6% 40px 6%;
            background: rgba(4, 6, 14, 0.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; overflow-y: auto; 
            pointer-events: none !important;
            display: none; 
            opacity: 0;
            transition: opacity 0.45s var(--ark-bezier), transform 0.45s var(--ark-bezier);
            will-change: transform, opacity;
        }

        .fullview-overlay.render-block { display: flex; }
        .fullview-overlay.prepare-from-right { opacity: 0; transform: translateX(100%); }
        .fullview-overlay.prepare-from-left  { opacity: 0; transform: translateX(-100%); }
        .fullview-overlay.active-page { 
            opacity: 1; 
            transform: translateX(0) scale(1) !important;
            pointer-events: auto !important; 
        }
        .fullview-overlay.exit-to-left  { opacity: 0; transform: translateX(-100%) scale(0.96); pointer-events: none !important; }
        .fullview-overlay.exit-to-right { opacity: 0; transform: translateX(100%) scale(0.96); pointer-events: none !important; }

        .fullview-overlay::-webkit-scrollbar, 
        .noti-sidebar-list::-webkit-scrollbar, 
        .generic-detail-panel::-webkit-scrollbar,
        .media-grid-container::-webkit-scrollbar { width: 4px; }
        .fullview-overlay::-webkit-scrollbar-thumb, 
        .noti-sidebar-list::-webkit-scrollbar-thumb, 
        .generic-detail-panel::-webkit-scrollbar-thumb,
        .media-grid-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 2px; }

        .page-header-area { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 25px; flex-shrink: 0; }
        .page-main-title { font-size: clamp(1.4rem, 2.2vw, 2.2rem); font-weight: 300; margin: 0; letter-spacing: 3px; color: #fff; }
        .page-sub-title { font-size: 0.75rem; color: var(--accent); letter-spacing: 2px; margin-top: 5px; font-family: monospace; }
        .page-back-btn {
            display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: rgba(255,255,255,0.6);
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 20px;
        }
        .page-back-btn:hover { color: #fff; border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* ================= 世界观 / 设定 卡片轮播 ================= */
        .slider-showcase-container { display: flex; align-items: center; justify-content: center; width: 100%; gap: 30px; position: relative; margin-top: 10px; flex-shrink: 0; }
        .cards-viewport { display: flex; align-items: center; justify-content: center; width: 85%; height: clamp(240px, 32vh, 380px); position: relative; overflow: hidden; }
        .showcase-card {
            position: absolute; width: 55%; height: 100%; background-size: cover; background-position: center; border: 1px solid var(--glass-border);
            clip-path: polygon(0 0, calc(100% - 40px) 0, 100% 40px, 100% 100%, 40px 100%, 0 calc(100% - 40px)); transition: all 0.45s var(--ark-bezier); opacity: 0; pointer-events: none; z-index: 1;
        }
        .showcase-card.active { opacity: 1; pointer-events: auto; transform: scale(1) translateX(0); z-index: 3; border-color: var(--accent); box-shadow: 0 0 30px rgba(0, 229, 255, 0.15); }
        .showcase-card.prev { opacity: 0.25; transform: scale(0.85) translateX(-70%); z-index: 2; }
        .showcase-card.next { opacity: 0.25; transform: scale(0.85) translateX(70%); z-index: 2; }
        .slide-arrow { font-size: 2rem; color: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; padding: 10px; z-index: 10; user-select: none; }
        .slide-arrow:hover { color: #fff; text-shadow: 0 0 10px var(--accent); }
        .indicator-dots { display: flex; justify-content: center; gap: 12px; margin: 20px 0; align-items: center; flex-shrink: 0; }
        .indicator-dot { width: 6px; height: 6px; background: rgba(255,255,255,0.25); border-radius: 50%; transition: 0.3s; cursor: pointer; }
        .indicator-dot.active { background: #fff; transform: scale(1.3); box-shadow: 0 0 10px #fff, 0 0 4px var(--accent); }

        .content-display-panel { width: 100%; max-width: 900px; margin: 10px auto 0 auto; text-align: left; }
        .dynamic-title-group { margin-bottom: 16px; }
        .dynamic-main-title { font-size: 1.7rem; font-weight: 500; margin: 0 0 8px 0; color: #fff; letter-spacing: 1px; }
        .dynamic-sub-quote { font-size: 0.95rem; color: var(--accent); font-weight: bold; letter-spacing: 1px; margin-bottom: 20px; display: block; }
        .dynamic-body-text { font-size: 0.95rem; color: rgba(255,255,255,0.7); line-height: 1.9; text-align: justify; padding-bottom: 60px; }

        /* ================= 告示页面分栏布局 ================= */
        .page-layout-container { display: flex; gap: 30px; flex-grow: 1; height: calc(100vh - 220px); min-height: 400px; overflow: hidden; }
        .noti-sidebar-list { width: 32%; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 6px; height: 100%; padding-bottom: 40px; }
        .noti-item-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 15px; border-radius: 6px; cursor: pointer; transition: 0.25s; flex-shrink: 0; }
        .noti-item-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(0, 229, 255, 0.3); }
        .noti-item-card.item-active { background: rgba(0, 229, 255, 0.06); border-color: var(--accent); box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.05); }
        .noti-item-date { font-size: 0.75rem; color: rgba(255,255,255,0.35); font-family: monospace; letter-spacing: 0.5px; }
        .noti-item-title { font-size: 0.88rem; margin: 6px 0 0 0; font-weight: 400; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .noti-item-card.item-active .noti-item-title { color: #fff; font-weight: 500; }

        .generic-detail-panel { width: 68%; background: rgba(255,255,255,0.01); border: 1px solid var(--glass-border); border-radius: 8px; padding: 35px; overflow-y: auto; height: 100%; padding-bottom: 40px; }
        .detail-title { font-size: 1.4rem; font-weight: 400; margin: 0 0 10px 0; color: #fff; letter-spacing: 0.5px; line-height: 1.4; }
        .detail-meta { font-size: 0.8rem; color: rgba(255,255,255,0.4); font-family: monospace; border-bottom: 1px solid var(--glass-border); padding-bottom: 14px; margin-bottom: 22px; }
        .detail-content { line-height: 1.85; color: rgba(255,255,255,0.75); font-size: 0.92rem; text-align: justify; }
        .detail-content p { margin: 0 0 16px 0; }

        /* ================= 媒体页面重构（深色赛博统一风） ================= */
        .media-capsule-container { display: flex; gap: 14px; margin: 5px 0 25px 0; flex-shrink: 0; list-style: none; padding: 0; }
        .media-capsule-btn {
            padding: 8px 24px; font-size: 0.88rem; font-weight: 500; color: rgba(255,255,255,0.6);
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px;
            cursor: pointer; transition: all 0.3s var(--ark-bezier); letter-spacing: 2px;
        }
        .media-capsule-btn.capsule-active {
            background: rgba(0, 229, 255, 0.08); color: var(--accent); border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow); font-weight: 600;
        }

        .media-grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; overflow-y: auto; flex-grow: 1; padding-bottom: 40px; width: 100%; }
        
        .media-matrix-card {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--glass-border); 
            padding: 0; border-radius: 12px; 
            cursor: pointer; position: relative; width: 100%; height: fit-content;
            overflow: hidden; opacity: 0; transform: translateY(20px);
            display: flex; flex-direction: column;
            transition: transform 0.4s var(--ark-bezier), box-shadow 0.4s var(--ark-bezier), border-color 0.4s var(--ark-bezier);
        }
        .media-matrix-card.reveal-manifest { opacity: 1; transform: translateY(0); transition: opacity 0.45s var(--ark-bezier), transform 0.45s var(--ark-bezier); }
        .media-matrix-card:hover { 
            border-color: var(--accent); 
            box-shadow: 0 12px 30px rgba(0, 229, 255, 0.15); 
            transform: translateY(-4px);
        }

        .matrix-video-cover-wrap { 
            width: 100%; aspect-ratio: 16 / 9; position: relative; overflow: hidden; background: #000; flex-shrink: 0;
        }
        .matrix-video-cover-wrap img {
            width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s var(--ark-bezier);
        }
        .media-matrix-card:hover .matrix-video-cover-wrap img { transform: scale(1.05); }

        .matrix-play-indicator { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); transition: background 0.3s; z-index: 2; }
        .media-matrix-card:hover .matrix-play-indicator { background: rgba(0,0,0,0.4); }
        
        .matrix-play-icon {
            width: 52px; height: 52px; background: rgba(3, 5, 13, 0.8); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff;
            font-size: 1.1rem; padding-left: 4px; backdrop-filter: blur(8px); transition: all 0.3s var(--ark-bezier);
        }
        .media-matrix-card:hover .matrix-play-icon { transform: scale(1.1); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        
        .matrix-card-title { 
            font-size: 0.9rem; font-weight: 400; color: rgba(255,255,255,0.85); margin: 0;
            padding: 16px 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        .media-matrix-card:hover .matrix-card-title { color: #fff; }

        /* ================= 全局高清剧场弹窗面板 ================= */
        .cinema-theater-backdrop {
            position: fixed; inset: 0; width: 100%; height: 100%; 
            background: rgba(3, 5, 11, 0); backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
            z-index: 6000; display: none; align-items: center; justify-content: center; opacity: 0;
            transition: opacity 0.4s var(--ark-bezier), background 0.4s var(--ark-bezier), backdrop-filter 0.4s var(--ark-bezier);
        }
        .cinema-theater-backdrop.theater-manifest {
            display: flex; opacity: 1;
            background: rgba(2, 3, 6, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }

        .cinema-theater-window {
            width: 90%; max-width: 1060px; aspect-ratio: 16 / 9; background: #000;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), 0 0 1px rgba(255,255,255,0.1); position: relative; border-radius: 12px;
            overflow: hidden; transform: translateY(50px) scale(0.96); border: 1px solid var(--glass-border);
            transition: transform 0.4s var(--ark-bezier); will-change: transform;
        }
        .cinema-theater-backdrop.theater-manifest .cinema-theater-window {
            transform: translateY(0) scale(1);
        }

        .cinema-close-trigger {
            position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; background: rgba(3, 5, 13, 0.7);
            border: 1px solid var(--glass-border); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.7); font-size: 0.9rem; cursor: pointer; z-index: 100; backdrop-filter: blur(4px); transition: all 0.25s ease;
        }
        .cinema-close-trigger:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05) rotate(90deg); box-shadow: 0 0 10px var(--accent-glow); }

        .cinema-iframe-core { width: 100%; height: 100%; border: none; display: block; background: #000; }

        .cinema-fallback-dock {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 14px; background: rgba(3, 5, 13, 0.85);
            padding: 8px 22px; border-radius: 30px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); z-index: 50; pointer-events: auto;
        }
        .fallback-text { font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.5px; }
        .fallback-action-btn {
            font-size: 0.8rem; color: var(--accent); text-decoration: none; font-weight: 500;
            border-bottom: 1px dashed var(--accent); padding-bottom: 1px; transition: opacity 0.2s;
        }
        .fallback-action-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="header-left">
            <div class="header-logo">奇迹城 × 梦想</div>
            <nav class="nav-menu">
                <div class="nav-btn active" id="nav-home" onclick="navigateToPage('home')">主页</div>
                <div class="nav-btn" id="nav-info" onclick="navigateToPage('info')">世界观</div>
                <div class="nav-btn" id="nav-db" onclick="navigateToPage('db')">设定</div>
                <div class="nav-btn" id="nav-news" onclick="navigateToPage('news')">告示</div>
                <div class="nav-btn" id="nav-media" onclick="navigateToPage('media')">媒体</div>
            </nav>
        </div>
    </header>

    <div id="main-stage">
        <canvas id="star-canvas"></canvas>
        <div class="character-split-layer"></div>
        <div class="view-homepage-content">
            <div class="center-hero">
                <h1 class="title-large">奇迹城</h1>
                <div class="title-sub">M I R A C L E · C I T Y</div>
                <p class="quote-text">「……原来你真的是这里的设计师啊。」—— 链接已建立，梦想铁道列车正平稳通过中央干线。</p>
                <div class="hero-arrow-wrap" onclick="navigateToPage('info')" title="进入世界观">
                    <div class="hero-arrow-circle">
                        <svg viewBox="0 0 24 24"><polyline points="8 5 16 12 8 19"></polyline></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-info-page" class="fullview-overlay">
        <div class="page-header-area">
            <div>
                <h2 class="page-main-title">世界观设定核心</h2>
                <div class="page-sub-title">// WORLDVIEW MATRIX CORE</div>
            </div>
            <div class="page-back-btn" onclick="navigateToPage('home')"><span>返回主页</span></div>
        </div>
        <div class="slider-showcase-container">
            <div class="slide-arrow" onclick="moveSlider('info', -1)">〈</div>
            <div class="cards-viewport">
                <div class="showcase-card" style="background-image: url('https://free.picui.cn/free/2026/05/17/6a09b53f77b10.png');"></div>
                <div class="showcase-card" style="background-image: url('https://free.picui.cn/free/2026/05/17/6a09b53f7e781.png');"></div>
                <div class="showcase-card" style="background-image: url('https://free.picui.cn/free/2026/05/17/6a09b53ed56d5.png');"></div>
            </div>
            <div class="slide-arrow" onclick="moveSlider('info', 1)">〉</div>
        </div>
        <div class="indicator-dots" id="dots-info"></div>
        <div class="content-display-panel">
            <div class="dynamic-title-group">
                <h3 class="dynamic-main-title" id="info-render-title"></h3>
                <span class="dynamic-sub-quote" id="info-render-quote"></span>
            </div>
            <div class="dynamic-body-text" id="info-render-body"></div>
        </div>
    </div>

    <div id="view-db-page" class="fullview-overlay">
        <div class="page-header-area">
            <div>
                <h2 class="page-main-title">设定</h2>
                <div class="page-sub-title">// SETTINGS</div>
            </div>
            <div class="page-back-btn" onclick="navigateToPage('home')"><span>返回主页</span></div>
        </div>
        <div class="slider-showcase-container">
            <div class="slide-arrow" onclick="moveSlider('db', -1)">〈</div>
            <div class="cards-viewport">
                <div class="showcase-card" style="background-image: url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=1200&q=80');"></div>
                <div class="showcase-card" style="background-image: url('https://images.unsplash.com/photo-1639322537228-f710d846310a?auto=format&fit=crop&w=1200&q=80');"></div>
                <div class="showcase-card" style="background-image: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=crop&w=1200&q=80');"></div>
            </div>
            <div class="slide-arrow" onclick="moveSlider('db', 1)">〉</div>
        </div>
        <div class="indicator-dots" id="dots-db"></div>
        <div class="content-display-panel">
            <div class="dynamic-title-group">
                <h3 class="dynamic-main-title" id="db-render-title"></h3>
                <span class="dynamic-sub-quote" id="db-render-quote"></span>
            </div>
            <div class="dynamic-body-text" id="db-render-body"></div>
        </div>
    </div>

    <div id="view-news-page" class="fullview-overlay" style="overflow-y: hidden;">
        <div class="page-header-area">
            <div>
                <h2 class="page-main-title">系统广播中心</h2>
                <div class="page-sub-title">// SYSTEM BROADCAST CORE</div>
            </div>
            <div class="page-back-btn" onclick="navigateToPage('home')"><span>返回主页</span></div>
        </div>
        <div class="page-layout-container">
            <div class="noti-sidebar-list" id="noti-list-container"></div>
            <div class="generic-detail-panel">
                <h3 class="detail-title" id="nd-title"></h3>
                <div class="detail-meta" id="nd-meta"></div>
                <div class="detail-content" id="nd-content"></div>
            </div>
        </div>
    </div>

    <div id="view-media-page" class="fullview-overlay" style="overflow-y: hidden;">
        <div class="page-header-area">
            <div>
                <h2 class="page-main-title">媒体视听数据库</h2>
                <div class="page-sub-title">// MEDIA BROADCAST CENTER</div>
            </div>
            <div class="page-back-btn" onclick="navigateToPage('home')"><span>返回主页</span></div>
        </div>
        <ul class="media-capsule-container" id="media-capsules-wrap"></ul>
        <div class="media-grid-container" id="media-matrix-grid"></div>
    </div>

    <div class="cinema-theater-backdrop" id="global-cinema-layer" onclick="closeCinemaTheater()">
        <div class="cinema-theater-window" onclick="event.stopPropagation()">
            <div class="cinema-close-trigger" onclick="closeCinemaTheater()">✕</div>
            <div id="cinema-injection-point" style="width:100%; height:100%;"></div>
            <div class="cinema-fallback-dock">
                <span class="fallback-text">如果视频无法加载或遭遇官方拦截</span>
                <a href="#" id="cinema-fallback-anchor" target="_blank" class="fallback-action-btn">跳转至 B 站独立观看 ↗</a>
            </div>
        </div>
    </div>

    <script src="data.js"></script>

    <script>
        const safeData = window.WEBSITE_DATA || { info: [], db: [], news: [], media: { tabs: [], items: [] } };
        const sliderData = { info: safeData.info || [], db: safeData.db || [] };
        const newsData = safeData.news || [];
        const mediaConfig = safeData.media || { tabs: [], items: [] };

        let currentActiveNotiIdx = 0;
        let sliderIndices = { info: 0, db: 0 };

        const PAGE_SEQUENCE = ['home', 'info', 'db', 'news', 'media'];
        let currentPageId = 'home';

        // ================= 核心路由系统 =================
        function navigateToPage(targetPageId, pushState = true) {
            if (targetPageId === currentPageId) return;

            const stageEl = document.getElementById('main-stage');
            const oldIndex = PAGE_SEQUENCE.indexOf(currentPageId);
            const newIndex = PAGE_SEQUENCE.indexOf(targetPageId);
            const isTargetOnRight = newIndex > oldIndex;

            if (pushState) {
                const newUrl = targetPageId === 'home' ? window.location.pathname : `?page=${targetPageId}`;
                window.history.pushState({ page: targetPageId }, '', newUrl);
            }

            let oldOverlayEl = document.getElementById(`view-${currentPageId}-page`);
            let targetOverlayEl = document.getElementById(`view-${targetPageId}-page`);

            document.querySelectorAll('.fullview-overlay').forEach(el => {
                if (el !== oldOverlayEl && el !== targetOverlayEl) {
                    el.className = 'fullview-overlay';
                }
            });

            if (currentPageId === 'home') {
                stageEl.classList.add('stage-hidden');
            } else if (oldOverlayEl) {
                oldOverlayEl.classList.remove('active-page');
                oldOverlayEl.classList.add(isTargetOnRight ? 'exit-to-left' : 'exit-to-right');
            }

            if (targetPageId !== 'home' && targetOverlayEl) {
                targetOverlayEl.classList.remove('exit-to-left', 'exit-to-right');
                targetOverlayEl.classList.add('render-block');
                targetOverlayEl.classList.add(isTargetOnRight ? 'prepare-from-right' : 'prepare-from-left');

                targetOverlayEl.getBoundingClientRect(); 
                targetOverlayEl.classList.add('active-page');
            } else if (targetPageId === 'home') {
                stageEl.classList.remove('stage-hidden');
            }

            currentPageId = targetPageId;
            document.querySelectorAll('.nav-menu .nav-btn').forEach(b => b.classList.remove('active'));
            const navBtnEl = document.getElementById(`nav-${targetPageId}`);
            if (navBtnEl) navBtnEl.classList.add('active');

            if (sliderIndices[targetPageId] !== undefined) renderSlider(targetPageId);
            if (targetPageId === 'media') triggerMediaStaggerAnimation();
        }

        document.querySelectorAll('.fullview-overlay').forEach(el => {
            el.addEventListener('transitionend', (e) => {
                if (e.propertyName === 'transform' || e.propertyName === 'opacity') {
                    if (!el.classList.contains('active-page')) {
                        el.classList.remove('render-block', 'prepare-from-left', 'prepare-from-right', 'exit-to-left', 'exit-to-right');
                    }
                }
            });
        });

        // ================= 彻底修复：100% 动态数据源渲染与极速开播引擎 =================
        function openCinemaTheater(targetBvid) {
            const theaterLayer = document.getElementById('global-cinema-layer');
            const injectionPoint = document.getElementById('cinema-injection-point');
            const fallbackAnchor = document.getElementById('cinema-fallback-anchor');
            
            // 严格清洗你从 data.js 里传过来的任何 BV 字段信息
            let cleanBvid = String(targetBvid || '').replace(/\s+/g, '');
            
            // 数据托底安全保护：如果没有有效链接，则自动加载最新的通用官方链接作为预览
            if (!cleanBvid || cleanBvid === 'undefined' || cleanBvid === 'null') {
                cleanBvid = 'BV1w6421h7H6'; 
            }
            
            // 同步修正外部依赖跳转锚点
            fallbackAnchor.href = `https://www.bilibili.com/video/${cleanBvid}`;

            theaterLayer.style.display = 'flex';
            requestAnimationFrame(() => {
                theaterLayer.classList.add('theater-manifest');
            });

            // 核心 Iframe 构建：注入最新的官方防盗链参数规范
            injectionPoint.innerHTML = `
                <iframe class="cinema-iframe-core" 
                        src="https://player.bilibili.com/player.html?bvid=${cleanBvid}&page=1&high_quality=1&danmaku=0&autoplay=1" 
                        scrolling="no" 
                        border="0" 
                        frameborder="no" 
                        framespacing="0" 
                        allow="autoplay; encrypted-media; fullscreen"
                        sandbox="allow-top-navigation allow-same-origin allow-forms allow-scripts allow-popups">
                </iframe>`;
        }

        function closeCinemaTheater() {
            const theaterLayer = document.getElementById('global-cinema-layer');
            const injectionPoint = document.getElementById('cinema-injection-point');
            
            theaterLayer.classList.remove('theater-manifest');
            setTimeout(() => {
                theaterLayer.style.display = 'none';
                injectionPoint.innerHTML = '';
            }, 400);
        }

        // ================= 视图模块数据构造渲染逻辑 =================
        function initSliderDots(pageKey) {
            const dotsContainer = document.getElementById(`dots-${pageKey}`);
            if (!dotsContainer) return;
            dotsContainer.innerHTML = '';
            if (sliderData[pageKey]) {
                sliderData[pageKey].forEach((_, idx) => {
                    const dot = document.createElement('div');
                    dot.className = `indicator-dot ${idx === sliderIndices[pageKey] ? 'active' : ''}`;
                    dot.onclick = () => { sliderIndices[pageKey] = idx; renderSlider(pageKey); };
                    dotsContainer.appendChild(dot);
                });
            }
        }

        function moveSlider(pageKey, direction) {
            const items = sliderData[pageKey];
            if (!items || items.length === 0) return;
            let currentIdx = sliderIndices[pageKey] + direction;
            if (currentIdx < 0) currentIdx = items.length - 1;
            if (currentIdx >= items.length) currentIdx = 0;
            sliderIndices[pageKey] = currentIdx;
            renderSlider(pageKey);
        }

        function renderSlider(pageKey) {
            const items = sliderData[pageKey];
            if (!items || items.length === 0) return;
            const currentIdx = sliderIndices[pageKey];
            const pageOverlay = document.getElementById(`view-${pageKey}-page`);
            if (!pageOverlay) return;

            const cards = pageOverlay.querySelectorAll('.showcase-card');
            cards.forEach((card, idx) => {
                card.className = 'showcase-card';
                if (idx === currentIdx) card.classList.add('active');
                else if (idx === (currentIdx - 1 + items.length) % items.length) card.classList.add('prev');
                else if (idx === (currentIdx + 1) % items.length) card.classList.add('next');
            });

            const dots = pageOverlay.querySelectorAll('.indicator-dot');
            dots.forEach((dot, idx) => { dot.classList.toggle('active', idx === currentIdx); });

            const data = items[currentIdx];
            if (data) {
                document.getElementById(`${pageKey}-render-title`).innerText = data.title || '';
                document.getElementById(`${pageKey}-render-quote`).innerText = data.quote || '';
                document.getElementById(`${pageKey}-render-body`).innerHTML = data.body || '';
            }
        }

        function buildNotificationList() {
            const listContainer = document.getElementById('noti-list-container');
            if (!listContainer || newsData.length === 0) return;
            listContainer.innerHTML = ''; 

            newsData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `noti-item-card ${index === currentActiveNotiIdx ? 'item-active' : ''}`;
                card.onclick = () => switchNotiDetail(index, card);

                const dateEl = document.createElement('div');
                dateEl.className = 'noti-item-date';
                dateEl.innerText = item.date;

                const titleEl = document.createElement('div');
                titleEl.className = 'noti-item-title';
                titleEl.innerText = item.title;

                card.appendChild(dateEl);
                card.appendChild(titleEl);
                listContainer.appendChild(card);
            });
            refreshNotiDetailText();
        }

        function switchNotiDetail(index, element) {
            document.querySelectorAll('.noti-item-card').forEach(card => card.classList.remove('item-active'));
            if(element) element.classList.add('item-active');
            currentActiveNotiIdx = index;
            refreshNotiDetailText();
        }

        function refreshNotiDetailText() {
            if (newsData.length === 0) return;
            const data = newsData[currentActiveNotiIdx];
            if (!data) return;
            document.getElementById('nd-title').innerText = data.title || '';
            document.getElementById('nd-meta').innerText = data.meta || '';
            document.getElementById('nd-content').innerHTML = data.content || '';
        }

        // ================= 严格动态多媒体布局系统 =================
        function buildMediaLayout() {
            const capsuleContainer = document.getElementById('media-capsules-wrap');
            const gridContainer = document.getElementById('media-matrix-grid');
            if (!capsuleContainer || !gridContainer) return;

            capsuleContainer.innerHTML = '';
            if (mediaConfig.tabs) {
                mediaConfig.tabs.forEach((tabName) => {
                    const li = document.createElement('li');
                    li.className = 'media-capsule-btn capsule-active';
                    li.innerText = tabName;
                    capsuleContainer.appendChild(li);
                });
            }

            gridContainer.innerHTML = '';
            if (mediaConfig.items) {
                mediaConfig.items.forEach((item) => {
                    const card = document.createElement('div');
                    card.className = 'media-matrix-card';
                    
                    // 动态感知解构：优先提取 item.bvid，其次兼容 item.bv 或者 item.id 
                    const dynamicBvNumber = item.bvid || item.bv || item.id;
                    card.onclick = () => openCinemaTheater(dynamicBvNumber); 

                    const coverWrap = document.createElement('div');
                    coverWrap.className = 'matrix-video-cover-wrap';

                    const coverImg = document.createElement('img');
                    coverImg.src = item.img || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80';
                    coverImg.alt = item.title || 'Video Cover';

                    const playIndicator = document.createElement('div');
                    playIndicator.className = 'matrix-play-indicator';

                    const playIcon = document.createElement('div');
                    playIcon.className = 'matrix-play-icon';
                    playIcon.innerText = '▶';

                    playIndicator.appendChild(playIcon);
                    coverWrap.appendChild(coverImg);
                    coverWrap.appendChild(playIndicator);

                    const titleEl = document.createElement('div');
                    titleEl.className = 'matrix-card-title';
                    titleEl.innerText = item.title || '未命名媒体流';

                    card.appendChild(coverWrap);
                    card.appendChild(titleEl);
                    gridContainer.appendChild(card);
                });
            }
        }

        function triggerMediaStaggerAnimation() {
            const cards = document.querySelectorAll('.media-matrix-card');
            cards.forEach((card, index) => {
                card.classList.remove('reveal-manifest');
                setTimeout(() => { card.classList.add('reveal-manifest'); }, index * 40); 
            });
        }

        // ================= 星空画布物理动画引擎 =================
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [], meteors = [], trainX = -1000;
        const colors = ['rgba(0, 229, 255, ', 'rgba(180, 100, 255, ', 'rgba(255, 255, 255, '];

        class Meteor {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width * 0.7; this.y = Math.random() * (canvas.height * 0.3);
                this.len = Math.random() * 100 + 60; this.speed = Math.random() * 6 + 3;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() { this.x += this.speed; this.y += this.speed * 0.4; if (this.x > canvas.width || this.y > canvas.height) this.reset(); }
            draw() {
                ctx.save(); ctx.beginPath();
                let gradient = ctx.createLinearGradient(this.x, this.y, this.x - this.len, this.y - this.len * 0.4);
                gradient.addColorStop(0, '#fff'); gradient.addColorStop(0.2, this.color + '0.4)'); gradient.addColorStop(1, 'transparent');
                ctx.strokeStyle = gradient; ctx.lineWidth = 1.2;
                ctx.moveTo(this.x, this.y); ctx.lineTo(this.x - this.len, this.y - this.len * 0.4);
                ctx.stroke(); ctx.restore();
            }
        }

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.dist = Math.sqrt(Math.pow(this.x - canvas.width/2, 2) + Math.pow(this.y - canvas.height/2, 2));
                this.angle = Math.atan2(this.y - canvas.height/2, this.x - canvas.width/2);
                this.size = Math.random() * 1.2 + 0.4; this.speed = Math.random() * 0.0004 + 0.0001;
                this.color = colors[Math.floor(Math.random() * colors.length)] + (Math.random() * 0.3 + 0.2) + ')';
            }
            update() { this.angle += this.speed; }
            draw() {
                const x = canvas.width/2 + Math.cos(this.angle) * this.dist;
                const y = canvas.height/2 + Math.sin(this.angle) * this.dist;
                ctx.beginPath(); ctx.fillStyle = this.color; ctx.arc(x, y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawGhostTrain() {
            ctx.save(); ctx.globalAlpha = 0.45; ctx.strokeStyle = "rgba(0, 229, 255, 0.9)"; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0, 229, 255, 0.8)";
            const trainY = canvas.height * 0.82; trainX += 1.2; if (trainX > canvas.width + 600) trainX = -800;
            for(let i=0; i<6; i++) { 
                let bx = trainX - (i * 125); ctx.strokeRect(bx, trainY, 115, 20);
                for(let j=0; j<4; j++) { ctx.strokeRect(bx + 8 + (j*26), trainY + 4, 18, 6); }
            }
            ctx.restore();
        }

        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = []; meteors = [];
            for (let i = 0; i < 200; i++) stars.push(new Star());
            for (let i = 0; i < 4; i++) meteors.push(new Meteor());
        }

        function animate() {
            ctx.fillStyle = 'rgba(3, 5, 13, 0.06)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGhostTrain(); stars.forEach(s => { s.update(); s.draw(); }); meteors.forEach(m => { m.update(); m.draw(); });
            requestAnimationFrame(animate);
        }

        function checkGitHubRedirectAndRoute() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('p') !== null) {
                window.history.replaceState(null, null, window.location.pathname + (urlParams.get('q') ? '?' + urlParams.get('q').replace(/~and~/g, '&') : ''));
                const pageParam = new URLSearchParams(window.location.search).get('page');
                if (pageParam) navigateToPage(pageParam, false);
            } else {
                const pageParam = urlParams.get('page');
                if (pageParam) navigateToPage(pageParam, false);
            }
        }

        window.addEventListener('popstate', (event) => {
            const page = (event.state && event.state.page) || 'home';
            navigateToPage(page, false);
        });

        window.addEventListener('resize', initCanvas);

        window.addEventListener('DOMContentLoaded', () => {
            buildNotificationList();
            buildMediaLayout();
            ['info', 'db'].forEach(key => { initSliderDots(key); renderSlider(key); });
            initCanvas(); 
            animate();
            
            const urlParams = new URLSearchParams(window.location.search);
            const initialPage = urlParams.get('page') || 'home';
            if (PAGE_SEQUENCE.includes(initialPage) && initialPage !== 'home') {
                currentPageId = initialPage;
                let targetOverlayEl = document.getElementById(`view-${initialPage}-page`);
                if (targetOverlayEl) {
                    document.getElementById('main-stage').classList.add('stage-hidden');
                    targetOverlayEl.classList.add('render-block');
                    targetOverlayEl.classList.add('active-page');
                    document.querySelectorAll('.nav-menu .nav-btn').forEach(b => b.classList.remove('active'));
                    let navBtnEl = document.getElementById(`nav-${initialPage}`);
                    if (navBtnEl) navBtnEl.classList.add('active');
                    if (['info', 'db'].includes(initialPage)) renderSlider(initialPage);
                }
            }
            checkGitHubRedirectAndRoute();
        });
    </script>
</body>
</html>
