<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX server | 未来与奇迹</title>
    <style>
        :root {
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --bg-dark: #0a0c16;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #03050d;
            overflow: hidden;
            color: #fff; font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            user-select: none;
        }

        /* --- 顶部导航栏 (完美还原截图) --- */
        .top-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 64px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background: rgba(3, 5, 13, 0.85);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .header-logo { font-size: 1.1rem; letter-spacing: 4px; font-weight: 600; color: #fff; }
        
        .nav-menu { display: flex; gap: 35px; }
        .nav-btn {
            font-size: 0.9rem; color: rgba(255,255,255,0.7); cursor: pointer;
            transition: 0.3s; position: relative; letter-spacing: 1px;
        }
        .nav-btn.active, .nav-btn:hover { color: #fff; }
        .nav-btn.active::before {
            content: '+'; position: absolute; left: -14px; color: var(--accent); font-weight: bold;
        }

        .header-right { display: flex; gap: 24px; color: rgba(255,255,255,0.6); font-size: 0.95rem; }
        .icon-btn { cursor: pointer; transition: 0.3s; }
        .icon-btn:hover { color: #fff; }

        /* --- 主舞台容器 --- */
        #main-stage {
            position: relative; width: 100%; height: 100%; display: none; z-index: 10;
        }

        /* --- Canvas 背景层 (右下角夜空、星轨与隐约列车) --- */
        #star-canvas {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
        }

        /* --- 左上角对角线切片层 (模拟截图角色特写区块) --- */
        .character-split-layer {
            position: absolute; inset: 0; z-index: 2;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.75) 0%, rgba(30, 41, 59, 0.5) 50%, transparent 50.01%);
            backdrop-filter: blur(2px);
            pointer-events: none;
        }

        /* --- 核心核心：中央大字标题与对角线错位排版 --- */
        .center-hero {
            position: absolute; inset: 0; z-index: 5;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: none; text-align: center;
        }
        .title-large {
            font-size: 4.5rem; letter-spacing: 12px; font-weight: 300; margin: 0;
            text-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .title-sub {
            font-size: 1.2rem; letter-spacing: 8px; color: rgba(255,255,255,0.6); margin: 15px 0 0 0;
            font-family: sans-serif;
        }
        .quote-text {
            margin-top: 80px; font-size: 0.85rem; color: rgba(255,255,255,0.4);
            letter-spacing: 3px; max-width: 500px; line-height: 1.8;
        }

        /* --- 侧边悬浮面板 (整合你之前的服务器数据) --- */
        .floating-side-card {
            position: absolute; left: 60px; bottom: 120px; z-index: 20;
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            padding: 30px; backdrop-filter: blur(20px); border-radius: 4px;
            width: 380px; pointer-events: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }
        .card-tag { color: var(--accent); font-size: 0.7rem; margin-bottom: 10px; letter-spacing: 2px; }
        .content-wrapper { position: relative; min-height: 120px; }
        .tab-content {
            position: absolute; top: 0; left: 0; width: 100%; opacity: 0;
            transform: translateY(10px); transition: all 0.4s ease; pointer-events: none;
        }
        .tab-content.active { opacity: 1; transform: translateY(0); pointer-events: auto; position: relative; }
        .panel-title { font-size: 1.5rem; margin: 0 0 12px 0; font-weight: 400; }
        .panel-body { color: rgba(255,255,255,0.6); line-height: 1.8; font-size: 0.9rem; margin: 0; }

        /* --- 轮播图UI外壳组件 (完全还原截图交互) --- */
        .arrow {
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 50;
            font-size: 1.8rem; color: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s;
            pointer-events: auto;
        }
        .arrow:hover { color: #fff; text-shadow: 0 0 10px #fff; }
        .arrow-left { left: 40px; }
        .arrow-right { right: 40px; }

        .play-btn {
            position: absolute; left: 40px; top: 55%; z-index: 50;
            width: 48px; height: 48px; border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s; pointer-events: auto;
        }
        .play-btn:hover { border-color: #fff; background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .play-btn::after {
            content: ''; display: block; margin-left: 4px;
            border-style: solid; border-width: 6px 0 6px 10px;
            border-color: transparent transparent transparent #fff;
        }

        .bottom-indicator {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 50; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .dots { display: flex; gap: 10px; align-items: center; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; cursor: pointer; }
        .dot.active { background: #fff; box-shadow: 0 0 8px #fff; }
        .scroll-hint { font-size: 0.8rem; color: rgba(255,255,255,0.4); animation: bounce 2s infinite; cursor: pointer; }

        /* --- 纯白高奢启动屏 --- */
        #splash-screen {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 2000; background: #03050d; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-launch {
            background: transparent; border: 1px solid rgba(255,255,255,0.15);
            color: #fff; padding: 16px 60px; cursor: pointer; font-size: 0.95rem;
            letter-spacing: 6px; border-radius: 30px; transition: 0.4s;
        }
        .btn-launch:hover { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } 60% { transform: translateY(-3px); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <button class="btn-launch" onclick="launch()">LINK START</button>
    </div>

    <header class="top-header">
        <div class="header-left">
            <div class="header-logo">奇迹城 × MX</div>
            <nav class="nav-menu">
                <div class="nav-btn active" onclick="switchTab('home', this)">主要概览</div>
                <div class="nav-btn" onclick="switchTab('info', this)">世界观</div>
                <div class="nav-btn" onclick="switchTab('db', this)">角色</div>
                <div class="nav-btn" onclick="alert('暂无新消息')">消息</div>
                <div class="nav-btn" onclick="alert('媒体中心筹备中')">媒体</div>
            </nav>
        </div>
        <div class="header-right">
            <span class="icon-btn">🌐</span>
            <span class="icon-btn">🔔</span>
            <span class="icon-btn">🔗</span>
        </div>
    </header>

    <div id="main-stage">
        <canvas id="star-canvas"></canvas>

        <div class="character-split-layer"></div>

        <div class="center-hero">
            <h1 class="title-large">奇迹城</h1>
            <div class="title-sub">M I R A C L E · C I T Y</div>
            <p class="quote-text">「……原来你真的是这里的设计师啊。」—— 链接已建立，梦想铁道列车正平稳通过中央干线。</p>
        </div>

        <div class="play-btn" onclick="alert('正在激活PV播放器...')"></div>

        <div class="arrow arrow-left" onclick="alert('已无上一个板块')">〈</div>
        <div class="arrow arrow-right" onclick="alert('已进入终点板块')">〉</div>

        <div class="bottom-indicator">
            <div class="dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="scroll-hint">➔</div>
        </div>

        <div class="floating-side-card" id="side-panel">
            <div class="card-tag">// SYSTEM PROTOCOL MONITOR</div>
            <div class="content-wrapper">
                <div id="page-home" class="tab-content active">
                    <h2 class="panel-title">梦绘未来</h2>
                    <p class="panel-body">当前运行季：（UTC+8）<br>2026.03.14 - 2026.06.20<br>高轨道星图同步率：100%</p>
                </div>
                <div id="page-info" class="tab-content">
                    <h2 class="panel-title">服务器规格</h2>
                    <p class="panel-body">类型：纯净公益核心<br>赛季：S5 梦想纪元<br>状态：高性能全功能节点绿灯</p>
                </div>
                <div id="page-db" class="tab-content">
                    <h2 class="panel-title">铁道枢纽中心</h2>
                    <p class="panel-body">梦想铁道：一号中央主干线<br>浩泽轨交：次区域级轻铁网<br>系统底层：基于 1.19.2 精密架构</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [], meteors = [], trainX = -1000, speedMultiplier = 1;
        const colors = ['rgba(0, 229, 255, ', 'rgba(180, 100, 255, ', 'rgba(255, 255, 255, '];

        class Meteor {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width * 0.7;
                this.y = Math.random() * (canvas.height * 0.3);
                this.len = Math.random() * 100 + 60;
                this.speed = Math.random() * 6 + 3;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speed * speedMultiplier;
                this.y += this.speed * 0.4 * speedMultiplier;
                if (this.x > canvas.width || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.save(); ctx.beginPath();
                let gradient = ctx.createLinearGradient(this.x, this.y, this.x - this.len, this.y - this.len * 0.4);
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.2, this.color + '0.4)');
                gradient.addColorStop(1, 'transparent');
                ctx.strokeStyle = gradient; ctx.lineWidth = 1.2;
                ctx.moveTo(this.x, this.y); ctx.lineTo(x = this.x - this.len, y = this.y - this.len * 0.4);
                ctx.stroke(); ctx.restore();
            }
        }

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.dist = Math.sqrt(Math.pow(this.x - canvas.width/2, 2) + Math.pow(this.y - canvas.height/2, 2));
                this.angle = Math.atan2(this.y - canvas.height/2, this.x - canvas.width/2);
                this.size = Math.random() * 1.2 + 0.4;
                this.speed = Math.random() * 0.0004 + 0.0001;
                this.color = colors[Math.floor(Math.random() * colors.length)] + (Math.random() * 0.3 + 0.2) + ')';
            }
            update() { this.angle += this.speed * speedMultiplier; }
            draw() {
                const x = canvas.width/2 + Math.cos(this.angle) * this.dist;
                const y = canvas.height/2 + Math.sin(this.angle) * this.dist;
                ctx.beginPath(); ctx.fillStyle = this.color;
                ctx.arc(x, y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawGhostTrain() {
            ctx.save(); ctx.globalAlpha = 0.04; // 极其微弱隐约
            ctx.strokeStyle = "rgba(0, 229, 255, 0.5)"; ctx.lineWidth = 1;
            const trainY = canvas.height * 0.82;
            trainX += 1 * speedMultiplier;
            if (trainX > canvas.width + 600) trainX = -800;
            for(let i=0; i<6; i++) { 
                let bx = trainX - (i * 125);
                ctx.strokeRect(bx, trainY, 115, 20);
                for(let j=0; j<4; j++) ctx.strokeRect(bx + 8 + (j*26), trainY + 4, 18, 6);
            }
            ctx.restore();
        }

        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = []; meteors = [];
            for (let i = 0; i < 200; i++) stars.push(new Star());
            for (let i = 0; i < 4; i++) meteors.push(new Meteor());
        }

        function animate() {
            ctx.fillStyle = 'rgba(3, 5, 13, 0.06)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGhostTrain();
            stars.forEach(s => { s.update(); s.draw(); });
            meteors.forEach(m => { m.update(); m.draw(); });
            requestAnimationFrame(animate);
        }

        function launch() {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-stage').style.display = 'block';
                initCanvas(); animate();
            }, 1000);
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const targetContent = document.getElementById('page-' + id);
            if(targetContent) targetContent.classList.add('active');
            
            // 联动底下轮播小圆点
            const dots = document.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            const idx = Array.from(btn.parentNode.children).indexOf(btn);
            if(dots[idx]) dots[idx].classList.add('active');
        }

        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
